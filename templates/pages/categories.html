{% extends 'base/base.html' %}

{% load static %}

{% block content %}

<div class="subheader py-2 py-lg-6 subheader-transparent" id="kt_subheader">
    <div class="container d-flex align-items-center justify-content-between flex-wrap flex-sm-nowrap">
        <div class="d-flex align-items-center flex-wrap mr-2">
            <h5 class="text-dark font-weight-bold mt-2 mb-2 mr-5">{{ title }}</h5>
            <div class="subheader-separator subheader-separator-ver mt-2 mb-2 mr-4 bg-gray-200"></div>
            {% url 'profile:modal_add_category' as add_category %}

               data-open-modal
               data-modal-url="{{ add_category }}"
               data-modal-id="{{ modal_id }}"
               data-modal-size="{{ modal_size }}">
                Add New
            </button>
        </div>
        <div class="d-flex align-items-center flex-wrap">
            <a href="#" class="btn btn-bg-white btn-icon-danger btn-hover-primary btn-icon mr-3 my-2 my-lg-0">

            </a>
            <a href="#" class="btn btn-bg-white font-weight-bold mr-3 my-2 my-lg-0" id="kt_dashboard_daterangepicker" data-toggle="tooltip" title="Select dashboard daterange" data-placement="left">

                            <i class="flaticon2-information icon-md text-muted" data-toggle="tooltip" data-placement="right" title="Click to learn more..."></i>
                        </li>
                        <li class="navi-separator mb-3 opacity-70"></li>

                </div>
            </div>
        </div>
    </div>
</div>
<div class="d-flex flex-column-fluid">
    <div class="container">
        <div class="row" id="divDataList">
        </div>
    </div>
</div>
{% endblock %}
{% block script %}
<script>
    const searchQuery = $('#searchQuery')
    const selectStatus = $('#selectStatus')
    
    function categoryInputChange() {
        const defaultFormData = {
            'search': searchQuery.val(),
            'status': selectStatus.val(),
            'request_url': '{% url 'profile:subpage_category_list' %}'
        }
        ajaxSubpageRequest(buildFormData(defaultFormData));
    }
    
    categoryInputChange()
    
    searchQuery.on('input', debounce(function() {categoryInputChange()}, 500))
    selectStatus.on('change', categoryInputChange)
</script>
{% endblock %}

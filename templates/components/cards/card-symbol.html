{% load static %}
{% for data in data_list %}
    <div class="{{ col_class }}">
        <div class="card card-custom gutter-b ribbon ribbon-top">
              <div class="ribbon-target bg-danger font-size-sm" style="top: -2px; right: 20px;">Default</div>
            <div class="card-body">
                <div class="d-flex flex-wrap align-items-center ">
                    <div class="symbol symbol-60 symbol-2by3 flex-shrink-0 mr-4">
                        <div class="symbol-label" style="background-image: url({{ data.icon.image.url }})"></div>
                    </div>
                    <div class="d-flex flex-column flex-grow-1 my-lg-0 my-2 pr-3">
                        <a href="#" class="text-dark-75 font-weight-bolder text-hover-primary font-size-lg">{{ data.name|capfirst }}</a>
                        <span class="text-muted font-weight-bold font-size-sm my-1">{{ data.description|truncatechars:20 }}</span>
                        <span class="text-muted font-weight-bold font-size-sm">Type:
                        <span class="text-primary font-weight-bold">{{ data.type|capfirst }}</span></span>
                    </div>
                    <div class="d-flex align-items-center py-lg-0 py-2">
                        <div class="d-flex flex-column text-right">
                            {% url 'profile:modal_update_category' data.id as update_category %}
                            <button class="btn btn-light-success font-weight-bolder font-size-sm py-2"
                                    data-open-modal
                                    data-modal-url="{{ update_category }}"
                                    data-modal-id=""
                                    data-modal-size="">View
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% empty %}
	<div class="col-lg-12 mt-20" >
        <div class="d-flex justify-content-center align-items-center flex-column">
            <i class="icon-xxl fas fa-box-open text-muted"></i>
            <h5 class="text-muted mt-3">No records found!</h5>
        </div>
    </div>
{% endfor %}

{% load static %}
<form id="updateCategoryForm" method="POST" action="">
    {% csrf_token %}
    <input type="hidden" name="id" id="id" value="{{ category.id }}">
    <input type="hidden" name="selected_icon" id="id_selected_icon" value="{{ category.icon.id }}">
    <div class="modal-header">
        <h5 class="modal-title" id="exampleModalLabel">View Category</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <i aria-hidden="true" class="ki ki-close"></i>
        </button>
    </div>
    <div class="modal-body">
        <div class="row justify-content-center">
            <div class="col-lg-12 mt15">
                <div class="form-group m-0">
                    <div class="row">
                        <div class="col-6">
                            <label class="option">
                                <span class="option-control">
                                   <span class="radio">
                                        <input type="radio" name="category_type" value="income"
                                            {% if category.type == 'INCOME' %}checked="checked"{% endif %} />
                                        <span></span>
                                   </span>
                                </span>
                                <span class="option-label">
                                    <span class="option-head"><span class="option-title">Income</span></span>
                                    <span class="option-body">Added as income type.</span>
                                </span>
                            </label>
                        </div>
                        <div class="col-6">
                            <label class="option">
                                <span class="option-control">
                                    <span class="radio">
                                        <input type="radio" name="category_type" value="expense"
                                            {% if category.type == 'EXPENSE' %}checked="checked"{% endif %} />
                                        <span></span>
                                    </span>
                                </span>
                                <span class="option-label">
                                    <span class="option-head"><span class="option-title">Expense</span></span>
                                    <span class="option-body">Added as expense type.</span>
                                </span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-12 mt-2">
                <div class="form-group mb-3">
                    <label for="id_name">Name: <span class="text-danger">*</span></label>
                    <input type="text" id="id_name" name="name" value="{{ category.name }}" class="form-control" placeholder="Enter category name" maxlength="150" required/>
               </div>
                <div class="form-group mb-3">
                    <label for="id_description">Description:</label>
                    <textarea id="id_description" name="description" class="form-control" rows="4" placeholder="Enter description..." maxlength="300">{{ category.description }}</textarea>
               </div>
            </div>

            <div class="col-lg-12">
                <div class="example mb-10">
                    <p>Icons: <span class="text-danger">*</span></p>
                    <div class="example-preview max-h-200px overflow-auto p-4">
                        {% for icon in icons %}
                            <div class="icon-selection symbol symbol-60 symbol-2by3 flex-shrink-0 mr-1 mb-2 {% if category.icon.id == icon.id %}active{% endif %}"
                                 data-icon-id="{{ icon.id }}">
                                <div class="symbol-label" style="background-image: url({{ icon.image.url }})"></div>
                            </div>
                        {% empty %}
                            <p class="text-muted text-center py-3">No icons available.</p>
                        {% endfor %}
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-footer">
        <button type="button" id="closeBtn" class="btn btn-light-primary font-weight-bold" data-dismiss="modal">Cancel</button>
        <button type="submit" id="submitBtn" class="btn btn-primary font-weight-bold">Submit</button>
    </div>
</form>

<script>
    $(document).ready(function() {
        $('.icon-selection').on('click', function () {
            const $this = $(this);
            $this.addClass('active').siblings('.icon-selection').removeClass('active');
            $('#id_selected_icon').val($this.data('icon-id'));
        });

        const updateCategoryForm = $('#updateCategoryForm')
        updateCategoryForm.submit(function (e) {
            e.preventDefault()
            const redirectionURL = 'flag_redirection'
            const closeBtn = $('#closeBtn')
            const submitBtn = $('#submitBtn')
            const requestURL = '{% url 'ledger:ajax_update_category' %}'
            const formData = new FormData(updateCategoryForm[0]);
            Ajax.postRequest(
                requestURL,
                formData,
                submitBtn,
                redirectionURL,
            )
            closeBtn.click()
            categoryInputChange()
        })
    });
</script>

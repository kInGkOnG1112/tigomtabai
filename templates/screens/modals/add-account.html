{% load static %}
<form id="addAccountForm" method="POST" action="">
    {% csrf_token %}
    <input type="hidden" name="selected_icon" id="id_selected_icon" value="{% if icons %}{{ icons.0.id }}{% endif %}">
    <div class="modal-header">
        <h5 class="modal-title" id="exampleModalLabel">Add Account</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <i aria-hidden="true" class="ki ki-close"></i>
        </button>
    </div>
    <div class="modal-body">
        <div class="row justify-content-center">

            <div class="col-lg-12 mt-2">
                <div class="form-group mb-5 select2-modal">
                    <label for="id_description">Institution: <span class="text-danger">*</span></label>
                    <select class="form-control select2 " id="kt_select2_1" name="institution">
                        {% for icon in icons %}
                        	<option value="{{ icon.id }}" data-image="{{ icon.image.url }}">{{ icon.name}}</option>
                        {% endfor %}
                     </select>
               </div>
                <div class="form-group mb-5">
                    <label for="id_name">Name: <span class="text-danger">*</span></label>
                    <input type="text" id="name" name="name" class="form-control" placeholder="Enter account name" maxlength="150" required/>
               </div>
                <div class="form-group mb-5">
                    <label for="id_name">Initial Balance: <span class="text-danger">*</span></label>
                    <input type="text" id="balance" name="balance" class="form-control amount" placeholder="0.00" inputmode="decimal" required/>
               </div>
                <div class="form-group mb-5">
                    <label for="id_description">Description:</label>
                    <textarea id="id_description" name="description" class="form-control" rows="4" placeholder="Enter description..." maxlength="300"></textarea>
               </div>
            </div>
        </div>
    </div>

    <div class="modal-footer">
        <button type="button" id="closeBtn" class="btn btn-light-primary font-weight-bold" data-dismiss="modal">Cancel</button>
        <button type="submit" id="submitBtn" class="btn btn-primary font-weight-bold">Submit</button>
    </div>
</form>
<script src="{% static 'js/autonumeric.js' %}"></script>
<script>
    $(document).ready(function() {
        
        $('#kt_select2_1').select2({
            placeholder: "Select an institution",
            templateResult: formatState,
            templateSelection: formatState,
        });

        const addAccountForm = $('#addAccountForm')
        addAccountForm.submit(function (e) {
            e.preventDefault()
            const redirectionURL = 'flag_redirection'
            const closeBtn = $('#closeBtn')
            const submitBtn = $('#submitBtn')
            const requestURL = '{% url 'profile:ajax_add_account' %}'
            const formData = new FormData(addAccountForm[0]);
            Ajax.postRequest(
                requestURL,
                formData,
                submitBtn,
                redirectionURL,
            ).then(function (response) {
                if (response.success){
                    closeBtn.click()
                    accountsInputChange()
                }
            })
        })
    });

</script>
